services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: luna
      POSTGRES_USER: luna
      POSTGRES_PASSWORD: luna_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
volumes:
  pgdata:
  redisdata:
