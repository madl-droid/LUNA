services:
  postgres:
    image: postgres:16
    container_name: luna-postgres
    environment:
      POSTGRES_USER: luna
      POSTGRES_PASSWORD: luna_dev
      POSTGRES_DB: luna
    ports:
      - "5432:5432"
    volumes:
      - luna_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: luna-redis
    ports:
      - "6379:6379"
    volumes:
      - luna_redisdata:/data

volumes:
  luna_pgdata:
  luna_redisdata:
