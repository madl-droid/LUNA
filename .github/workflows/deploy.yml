name: Build and Deploy

on:
  push:
    branches: [main, pruebas]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/pruebas' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          no-cache: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, luna]
    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Sync instance prompts from repo
        run: |
          REPO_PROMPTS="/docker/luna-repo/instance/prompts"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            DEST="/docker/luna-production/instance/prompts"
          else
            DEST="/docker/lab/instance/prompts"
          fi
          if [ -d "$REPO_PROMPTS" ] && [ -d "$DEST" ]; then
            rsync -av --delete "$REPO_PROMPTS/system/skills/" "$DEST/system/skills/"
            echo "Synced skills to $DEST/system/skills/"
          else
            echo "Warning: prompts directories not found, skipping sync"
          fi

      - name: Deploy
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            cd /docker/luna-production
          else
            cd /docker/lab
          fi
          docker compose pull app
          docker compose up -d app
