# =============================================================================
# Build & Push imagen a GHCR + Deploy a staging via SSH
# Produccion se actualiza manualmente
# =============================================================================

name: Build & Deploy Staging

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/luna:latest
            ghcr.io/${{ github.repository_owner }}/luna:${{ github.sha }}

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: claude-code
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo docker pull ghcr.io/madl-droid/luna:latest
            cd /docker/luna-staging && sudo docker compose up -d
