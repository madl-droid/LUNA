# =============================================================================
# Build & Push imagen a GHCR
# Watchtower en el VPS detecta la nueva imagen y actualiza staging automaticamente
# =============================================================================

name: Build & Push

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/luna:latest
            ghcr.io/${{ github.repository_owner }}/luna:${{ github.sha }}
