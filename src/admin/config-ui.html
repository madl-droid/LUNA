<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luna — Admin</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-hover: #334155;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #22c55e;
      --error: #ef4444;
      --warning: #f59e0b;
      --radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h1 span { color: var(--primary); }

    .header-actions { display: flex; gap: 10px; align-items: center; }

    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-badge.ok { background: rgba(34,197,94,0.15); color: var(--success); }
    .status-badge.error { background: rgba(239,68,68,0.15); color: var(--error); }
    .status-badge.saving { background: rgba(59,130,246,0.15); color: var(--primary); }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .section-header {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .section-header:hover { background: var(--surface-hover); }

    .section-title {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-chevron {
      transition: transform 0.2s;
      color: var(--text-muted);
    }
    .section.collapsed .section-chevron { transform: rotate(-90deg); }
    .section.collapsed .section-body { display: none; }

    .section-body {
      padding: 4px 20px 20px;
      border-top: 1px solid var(--border);
    }

    .field {
      padding: 12px 0;
      border-bottom: 1px solid rgba(51,65,85,0.5);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: center;
    }
    .field:last-child { border-bottom: none; }

    .field-label {
      font-size: 13px;
      font-weight: 500;
    }
    .field-desc {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .field-path {
      font-size: 10px;
      color: var(--text-muted);
      font-family: monospace;
      opacity: 0.6;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus {
      border-color: var(--primary);
    }
    input[type="number"] { font-family: monospace; }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      display: inline-block;
    }
    .toggle input { display: none; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: white;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--primary); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

    /* Array editor */
    .array-editor { display: flex; flex-direction: column; gap: 6px; }
    .array-item {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .array-item input { flex: 1; }
    .btn-icon {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .btn-icon:hover { border-color: var(--primary); color: var(--primary); }
    .btn-icon.remove:hover { border-color: var(--error); color: var(--error); }

    /* Model selector (composite) */
    .model-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .model-row {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 8px;
    }

    /* Save bar */
    .save-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      justify-content: center;
      gap: 12px;
      z-index: 100;
      transform: translateY(100%);
      transition: transform 0.3s;
    }
    .save-bar.visible { transform: translateY(0); }

    .btn {
      padding: 8px 24px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--text-muted); }

    /* Toast */
    .toast {
      position: fixed;
      top: 70px;
      right: 24px;
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      z-index: 200;
      animation: slideIn 0.3s ease;
      max-width: 400px;
    }
    .toast.success { background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid rgba(34,197,94,0.3); }
    .toast.error { background: rgba(239,68,68,0.15); color: var(--error); border: 1px solid rgba(239,68,68,0.3); }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 60vh;
      color: var(--text-muted);
      font-size: 16px;
    }

    .subsection-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      padding: 12px 0 4px;
      font-weight: 600;
    }

    /* Bottom padding for save bar */
    .container { padding-bottom: 80px; }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>LUNA</span> Admin</h1>
    <div class="header-actions">
      <span id="status" class="status-badge ok">Conectado</span>
    </div>
  </div>

  <div class="container" id="app">
    <div class="loading" id="loading">Cargando configuracion...</div>
  </div>

  <div class="save-bar" id="saveBar">
    <button class="btn btn-secondary" onclick="discardChanges()">Descartar</button>
    <button class="btn btn-primary" id="saveBtn" onclick="saveConfig()">Guardar cambios</button>
  </div>

  <script>
    let originalConfig = null;
    let currentConfig = null;
    let schema = null;
    let hasChanges = false;

    // --- Init ---
    async function init() {
      try {
        const [configRes, schemaRes] = await Promise.all([
          fetch('/api/config'),
          fetch('/api/schema'),
        ]);
        originalConfig = await configRes.json();
        schema = await schemaRes.json();
        currentConfig = structuredClone(originalConfig);
        render();
      } catch (err) {
        document.getElementById('loading').textContent = 'Error cargando configuracion: ' + err.message;
        setStatus('error', 'Error');
      }
    }

    // --- Render ---
    function render() {
      const app = document.getElementById('app');
      app.innerHTML = '';

      const sections = [
        { key: 'whatsapp', title: 'WhatsApp', icon: '💬' },
        { key: 'llm', title: 'LLM / Modelos de IA', icon: '🧠' },
        { key: 'memory', title: 'Memoria / Sesiones', icon: '💾' },
        { key: 'channels', title: 'Canales', icon: '📡' },
      ];

      for (const sec of sections) {
        if (!currentConfig[sec.key]) continue;
        const el = createSection(sec.key, sec.title, sec.icon, currentConfig[sec.key],
          schema?.properties?.[sec.key]);
        app.appendChild(el);
      }
    }

    function createSection(key, title, icon, data, schemaDef) {
      const section = document.createElement('div');
      section.className = 'section';

      const header = document.createElement('div');
      header.className = 'section-header';
      header.innerHTML = `
        <span class="section-title">${icon} ${schemaDef?.title || title}</span>
        <span class="section-chevron">▼</span>
      `;
      header.onclick = () => section.classList.toggle('collapsed');

      const body = document.createElement('div');
      body.className = 'section-body';

      renderFields(body, data, [key], schemaDef);

      section.appendChild(header);
      section.appendChild(body);
      return section;
    }

    function renderFields(container, data, pathParts, schemaDef) {
      if (!data || typeof data !== 'object') return;

      for (const [fieldKey, value] of Object.entries(data)) {
        const fieldPath = [...pathParts, fieldKey];
        const fieldSchema = schemaDef?.properties?.[fieldKey];

        if (value !== null && typeof value === 'object' && !Array.isArray(value)) {
          // Nested object — subsection
          const subTitle = document.createElement('div');
          subTitle.className = 'subsection-title';
          subTitle.textContent = fieldSchema?.title || fieldKey;
          container.appendChild(subTitle);
          renderFields(container, value, fieldPath, fieldSchema);
          continue;
        }

        const field = document.createElement('div');
        field.className = 'field';

        const labelDiv = document.createElement('div');
        const label = document.createElement('div');
        label.className = 'field-label';
        label.textContent = fieldSchema?.title || humanize(fieldKey);
        labelDiv.appendChild(label);

        if (fieldSchema?.description) {
          const desc = document.createElement('div');
          desc.className = 'field-desc';
          desc.textContent = fieldSchema.description;
          labelDiv.appendChild(desc);
        }

        const pathSpan = document.createElement('div');
        pathSpan.className = 'field-path';
        pathSpan.textContent = fieldPath.join('.');
        labelDiv.appendChild(pathSpan);

        const inputDiv = document.createElement('div');

        if (typeof value === 'boolean') {
          inputDiv.appendChild(createToggle(fieldPath, value));
        } else if (Array.isArray(value)) {
          inputDiv.appendChild(createArrayEditor(fieldPath, value, fieldSchema));
        } else if (typeof value === 'number') {
          inputDiv.appendChild(createNumberInput(fieldPath, value, fieldSchema));
        } else if (fieldSchema?.enum) {
          inputDiv.appendChild(createSelect(fieldPath, value, fieldSchema.enum));
        } else if (isModelField(fieldKey, fieldPath)) {
          inputDiv.appendChild(createModelSelect(fieldPath, String(value)));
        } else {
          inputDiv.appendChild(createTextInput(fieldPath, String(value)));
        }

        field.appendChild(labelDiv);
        field.appendChild(inputDiv);
        container.appendChild(field);
      }
    }

    // --- Field creators ---
    function createToggle(path, value) {
      const label = document.createElement('label');
      label.className = 'toggle';
      const input = document.createElement('input');
      input.type = 'checkbox';
      input.checked = value;
      input.onchange = () => { setNestedValue(currentConfig, path, input.checked); markChanged(); };
      const slider = document.createElement('span');
      slider.className = 'toggle-slider';
      label.appendChild(input);
      label.appendChild(slider);
      return label;
    }

    function createTextInput(path, value) {
      const input = document.createElement('input');
      input.type = 'text';
      input.value = value;
      input.oninput = () => { setNestedValue(currentConfig, path, input.value); markChanged(); };
      return input;
    }

    function createNumberInput(path, value, fieldSchema) {
      const input = document.createElement('input');
      input.type = 'number';
      input.value = value;
      if (fieldSchema?.minimum !== undefined) input.min = fieldSchema.minimum;
      if (fieldSchema?.maximum !== undefined) input.max = fieldSchema.maximum;
      input.oninput = () => { setNestedValue(currentConfig, path, Number(input.value)); markChanged(); };
      return input;
    }

    function createSelect(path, value, options) {
      const select = document.createElement('select');
      for (const opt of options) {
        const option = document.createElement('option');
        option.value = opt;
        option.textContent = opt;
        option.selected = opt === value;
        select.appendChild(option);
      }
      select.onchange = () => { setNestedValue(currentConfig, path, select.value); markChanged(); };
      return select;
    }

    function createModelSelect(path, value) {
      const select = document.createElement('select');
      const allModels = getAllModels();
      for (const model of allModels) {
        const option = document.createElement('option');
        option.value = model;
        option.textContent = model;
        option.selected = model === value;
        select.appendChild(option);
      }
      // Also allow typing custom model
      const customOpt = document.createElement('option');
      customOpt.value = '__custom__';
      customOpt.textContent = '-- Custom --';
      if (!allModels.includes(value)) {
        customOpt.selected = true;
      }
      select.appendChild(customOpt);

      select.onchange = () => {
        if (select.value === '__custom__') {
          const custom = prompt('Nombre del modelo:', value);
          if (custom) {
            setNestedValue(currentConfig, path, custom);
            markChanged();
            render();
          }
        } else {
          setNestedValue(currentConfig, path, select.value);
          markChanged();
        }
      };
      return select;
    }

    function createArrayEditor(path, values, fieldSchema) {
      const container = document.createElement('div');
      container.className = 'array-editor';

      const enumOpts = fieldSchema?.items?.enum;

      for (let i = 0; i < values.length; i++) {
        const item = document.createElement('div');
        item.className = 'array-item';

        if (enumOpts) {
          const select = document.createElement('select');
          for (const opt of enumOpts) {
            const option = document.createElement('option');
            option.value = opt;
            option.textContent = opt;
            option.selected = opt === values[i];
            select.appendChild(option);
          }
          select.onchange = () => {
            const arr = getNestedValue(currentConfig, path);
            arr[i] = select.value;
            markChanged();
          };
          item.appendChild(select);
        } else {
          const input = document.createElement('input');
          input.type = 'text';
          input.value = values[i];
          input.oninput = () => {
            const arr = getNestedValue(currentConfig, path);
            arr[i] = input.value;
            markChanged();
          };
          item.appendChild(input);
        }

        const removeBtn = document.createElement('button');
        removeBtn.className = 'btn-icon remove';
        removeBtn.textContent = '×';
        removeBtn.onclick = () => {
          const arr = getNestedValue(currentConfig, path);
          arr.splice(i, 1);
          markChanged();
          render();
        };
        item.appendChild(removeBtn);
        container.appendChild(item);
      }

      const addBtn = document.createElement('button');
      addBtn.className = 'btn-icon';
      addBtn.textContent = '+';
      addBtn.onclick = () => {
        const arr = getNestedValue(currentConfig, path);
        arr.push(enumOpts ? enumOpts[0] : '');
        markChanged();
        render();
      };
      container.appendChild(addBtn);

      return container;
    }

    // --- Helpers ---
    function isModelField(key, path) {
      return key === 'model' && path.some(p => p === 'models' || p === 'llm');
    }

    function getAllModels() {
      const available = currentConfig?.llm?.availableModels;
      if (!available) return [];
      return [...(available.anthropic || []), ...(available.gemini || [])];
    }

    function getNestedValue(obj, path) {
      let current = obj;
      for (const key of path) {
        if (current == null) return undefined;
        current = current[key];
      }
      return current;
    }

    function setNestedValue(obj, path, value) {
      let current = obj;
      for (let i = 0; i < path.length - 1; i++) {
        current = current[path[i]];
      }
      current[path[path.length - 1]] = value;
    }

    function humanize(str) {
      return str
        .replace(/([A-Z])/g, ' $1')
        .replace(/^./, s => s.toUpperCase())
        .replace(/([a-z])(\d)/g, '$1 $2');
    }

    function markChanged() {
      hasChanges = JSON.stringify(currentConfig) !== JSON.stringify(originalConfig);
      document.getElementById('saveBar').classList.toggle('visible', hasChanges);
    }

    function discardChanges() {
      currentConfig = structuredClone(originalConfig);
      hasChanges = false;
      document.getElementById('saveBar').classList.remove('visible');
      render();
      showToast('Cambios descartados', 'success');
    }

    // --- Save ---
    async function saveConfig() {
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = 'Guardando...';
      setStatus('saving', 'Guardando...');

      try {
        const res = await fetch('/api/config', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(currentConfig),
        });

        const result = await res.json();

        if (res.ok) {
          originalConfig = structuredClone(currentConfig);
          hasChanges = false;
          document.getElementById('saveBar').classList.remove('visible');
          setStatus('ok', 'Guardado');
          showToast('Configuracion guardada correctamente', 'success');
        } else {
          setStatus('error', 'Error');
          const msg = result.issues
            ? result.issues.map(i => `${i.path?.join('.')}: ${i.message}`).join('\n')
            : result.error;
          showToast('Error: ' + msg, 'error');
        }
      } catch (err) {
        setStatus('error', 'Error');
        showToast('Error de conexion: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Guardar cambios';
      }
    }

    // --- Status & Toast ---
    function setStatus(type, text) {
      const el = document.getElementById('status');
      el.className = 'status-badge ' + type;
      el.textContent = text;
      if (type !== 'error' && type !== 'saving') {
        setTimeout(() => { el.className = 'status-badge ok'; el.textContent = 'Conectado'; }, 3000);
      }
    }

    function showToast(message, type) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();

      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    // --- Start ---
    init();
  </script>
</body>
</html>
