<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luna — Oficina</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
    }
    header h1 span {
      color: #38bdf8;
      font-weight: 700;
    }
    .status {
      font-size: 0.875rem;
      color: #94a3b8;
    }
    .status.saved { color: #4ade80; }
    .status.error { color: #f87171; }
    main {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #64748b;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #1e293b;
    }
    .field {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 0.75rem;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid #1e293b;
    }
    .field label {
      font-size: 0.875rem;
      font-weight: 500;
      color: #cbd5e1;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .field input, .field select {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      color: #e2e8f0;
      font-size: 0.875rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      width: 100%;
    }
    .field input:focus, .field select:focus {
      outline: none;
      border-color: #38bdf8;
      box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
    }
    .field input.modified {
      border-color: #fbbf24;
    }
    .actions {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1e293b;
      border-top: 1px solid #334155;
      padding: 1rem 2rem;
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
    }
    .actions button {
      padding: 0.5rem 1.5rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
    }
    .btn-save {
      background: #2563eb;
      color: white;
    }
    .btn-save:hover { background: #1d4ed8; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-reset {
      background: #334155;
      color: #e2e8f0;
    }
    .btn-reset:hover { background: #475569; }
    .loading {
      text-align: center;
      padding: 4rem;
      color: #64748b;
    }
    .field-type {
      font-size: 0.625rem;
      color: #475569;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <header>
    <h1><span>LUNA</span> Oficina</h1>
    <div class="status" id="status">Cargando...</div>
  </header>
  <main id="main">
    <div class="loading">Cargando configuracion...</div>
  </main>
  <div class="actions">
    <button class="btn-reset" onclick="resetChanges()">Descartar</button>
    <button class="btn-save" id="saveBtn" onclick="saveChanges()" disabled>Guardar cambios</button>
  </div>

  <script>
    let originalValues = {}
    let currentValues = {}
    let schema = {}

    async function init() {
      try {
        const [configRes, schemaRes] = await Promise.all([
          fetch('/oficina/api/config'),
          fetch('/oficina/api/schema'),
        ])
        const configData = await configRes.json()
        const schemaData = await schemaRes.json()

        originalValues = { ...configData.values }
        currentValues = { ...configData.values }
        schema = schemaData.schema || {}

        render()
        setStatus('Conectado', '')
      } catch (err) {
        setStatus('Error al conectar', 'error')
        document.getElementById('main').innerHTML =
          '<div class="loading">Error al cargar la configuracion. Verifica que el servidor esta corriendo.</div>'
      }
    }

    function setStatus(text, cls) {
      const el = document.getElementById('status')
      el.textContent = text
      el.className = 'status ' + (cls || '')
    }

    function render() {
      const main = document.getElementById('main')
      const sections = {}

      // Group by schema sections
      for (const [key, info] of Object.entries(schema)) {
        const section = info.description || 'General'
        if (!sections[section]) sections[section] = []
        sections[section].push(key)
      }

      // Add any keys from current values not in schema
      for (const key of Object.keys(currentValues)) {
        if (!schema[key]) {
          const section = 'Otros'
          if (!sections[section]) sections[section] = []
          sections[section].push(key)
        }
      }

      let html = ''
      for (const [section, keys] of Object.entries(sections)) {
        html += `<div class="section-title">${section}</div>`
        for (const key of keys) {
          const value = currentValues[key] ?? schema[key]?.default ?? ''
          const type = schema[key]?.type ?? 'string'
          const isSecret = key.includes('KEY') || key.includes('SECRET') || key.includes('PASSWORD') || key.includes('TOKEN')

          let input
          if (type === 'boolean') {
            input = `<select data-key="${key}" onchange="onChange(this)">
              <option value="true" ${value === 'true' ? 'selected' : ''}>true</option>
              <option value="false" ${value !== 'true' ? 'selected' : ''}>false</option>
            </select>`
          } else {
            const inputType = isSecret ? 'password' : 'text'
            input = `<input type="${inputType}" data-key="${key}" value="${escapeAttr(value)}" oninput="onChange(this)">`
          }

          html += `<div class="field">
            <label>${key} <span class="field-type">${type}</span></label>
            ${input}
          </div>`
        }
      }

      main.innerHTML = html
      main.style.paddingBottom = '5rem'
    }

    function escapeAttr(str) {
      return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;')
    }

    function onChange(el) {
      const key = el.dataset.key
      const value = el.value
      currentValues[key] = value

      if (value !== (originalValues[key] ?? '')) {
        el.classList.add('modified')
      } else {
        el.classList.remove('modified')
      }

      updateSaveButton()
    }

    function updateSaveButton() {
      const hasChanges = Object.keys(currentValues).some(
        k => currentValues[k] !== (originalValues[k] ?? '')
      )
      document.getElementById('saveBtn').disabled = !hasChanges
    }

    function resetChanges() {
      currentValues = { ...originalValues }
      render()
      updateSaveButton()
      setStatus('Cambios descartados', '')
    }

    async function saveChanges() {
      const changes = {}
      for (const [key, value] of Object.entries(currentValues)) {
        if (value !== (originalValues[key] ?? '')) {
          changes[key] = value
        }
      }

      if (Object.keys(changes).length === 0) return

      try {
        setStatus('Guardando...', '')
        const res = await fetch('/oficina/api/config', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(changes),
        })
        const data = await res.json()
        if (data.ok) {
          originalValues = { ...currentValues }
          render()
          updateSaveButton()
          setStatus('Guardado', 'saved')
        } else {
          setStatus('Error al guardar', 'error')
        }
      } catch (err) {
        setStatus('Error de conexion', 'error')
      }
    }

    init()
  </script>
</body>
</html>
