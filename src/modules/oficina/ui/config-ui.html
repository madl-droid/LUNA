let lang = localStorage.getItem('luna-lang') || 'es'
function t(key) { return i18n[lang]?.[key] ?? i18n.es[key] ?? key }
function toggleLang() {
  lang = lang === 'es' ? 'en' : 'es'
  localStorage.setItem('luna-lang', lang)
  document.getElementById('lang-btn').textContent = lang === 'es' ? 'EN' : 'ES'
  render()
  updateSaveBtn()
}

// State

let originalValues = {}, currentValues = {}, allModels = { anthropic: [], gemini: [] }
let waState = { status: 'not_initialized', qrDataUrl: null, lastDisconnectReason: null, moduleEnabled: false }
let waPolling = null
let lastScan = null
let moduleStates = []

// ═══════════════════════════════════════════
// Init
// ═══════════════════════════════════════════
async function init() {
  document.getElementById('lang-btn').textContent = lang === 'es' ? 'EN' : 'ES'
  try {
    const [configRes, versionRes, modelsRes, modulesRes] = await Promise.all([
      fetch('/oficina/api/oficina/config'),
      fetch('/oficina/api/oficina/version'),
      fetch('/oficina/api/model-scanner/models'),
      fetch('/oficina/api/oficina/modules'),
    ])
    const configData = await configRes.json()
    const versionData = await versionRes.json()
    const modelsData = await modelsRes.json()
    const modulesData = await modulesRes.json()

    const v = versionData.version ?? 'dev'
    document.getElementById('build-ver').textContent = 'v' + (v.length > 7 ? v.slice(0, 7) : v)

    originalValues = { ...configData.values }
    currentValues = { ...configData.values }
    allModels = modelsData.models || { anthropic: [], gemini: [] }
    lastScan = modelsData.scan || null
    moduleStates = modulesData.modules || []

    await pollWa()
    render()
    setStatus(t('connected'), '')
    startWaPolling()
  } catch (err) {
    setStatus(t('errorConnect'), 'error')
    document.getElementById('main').innerHTML = '<div class="loading">' + t('errorConnect') + '</div>'
  }
}

// ═══════════════════════════════════════════
// WhatsApp
// ═══════════════════════════════════════════
async function pollWa() {
  try {
    const res = await fetch('/oficina/api/whatsapp/status')
    if (!res.ok) { waState = { status: 'not_initialized', qrDataUrl: null, lastDisconnectReason: null, moduleEnabled: false }; return }
    const ns = await res.json()
    const changed = ns.status !== waState.status || ns.qrDataUrl !== waState.qrDataUrl
    waState = ns
    if (changed) renderWa()
  } catch {}
}
function startWaPolling() { waPolling = setInterval(pollWa, 3000) }

async function waConnect() {
  showToast(t('connectingWa'), 'success')
  await fetch('/oficina/api/whatsapp/connect', { method: 'POST' })
  setTimeout(pollWa, 500); setTimeout(pollWa, 2000); setTimeout(pollWa, 4000)
}
async function waDisconnect() {
  if (!confirm(t('disconnectConfirm'))) return
  await fetch('/oficina/api/whatsapp/disconnect', { method: 'POST' })
  await pollWa()
  showToast('WhatsApp disconnected', 'success')
}

  const fallbackTasks = [
    ['LLM_FALLBACK_CLASSIFY', 'f_LLM_FB_CLASSIFY', 'i_LLM_FB_CLASSIFY'],
    ['LLM_FALLBACK_RESPOND', 'f_LLM_FB_RESPOND', 'i_LLM_FB_RESPOND'],
    ['LLM_FALLBACK_COMPLEX', 'f_LLM_FB_COMPLEX', 'i_LLM_FB_COMPLEX'],
  ]
  const scanInfo = lastScan ? `<span style="font-size:13px;color:var(--text-tertiary)">${t('lastScan')}: ${new Date(lastScan.lastScanAt).toLocaleString()}</span>` : ''
  const scanReplacements = (lastScan && lastScan.replacements && lastScan.replacements.length > 0)
    ? lastScan.replacements.map(r =>
        `<div style="font-size:13px;color:var(--warning);padding:6px 10px;background:rgba(255,149,0,0.08);border-radius:6px;margin-bottom:4px">
          ${r.configKey}: <s>${r.oldModel}</s> ${t('scanReplaced')} <b>${r.newModel}</b>
        </div>`
      ).join('') : ''
  let modelFields = `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0">
    <button class="wa-btn wa-btn-connect" onclick="triggerScan()" style="font-size:13px;padding:6px 14px">${t('scanModelsBtn')}</button>
    ${scanInfo}
  </div>
  <div id="scan-replacements">${scanReplacements}</div>
  <div style="font-size:13px;color:var(--text-tertiary);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;padding:8px 0 4px">${t('models_primary')}</div>`
  for (const [prefix, labelKey, infoKey] of modelTasks) {
    modelFields += modelDropdown(prefix, labelKey, infoKey)
  }
  modelFields += `<div style="font-size:13px;color:var(--text-tertiary);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;padding:16px 0 4px;border-top:1px solid var(--border-light);margin-top:8px">${t('models_fallback')}</div>`
  for (const [prefix, labelKey, infoKey] of fallbackTasks) {
    modelFields += modelDropdown(prefix, labelKey, infoKey)
  }
  h += panelRaw('models', modelFields)

  // 4. Limits & Tokens
  h += panel('llm_limits', [
    numField('LLM_MAX_INPUT_TOKENS', 'f_LLM_MAX_INPUT_TOKENS'),
    numField('LLM_MAX_OUTPUT_TOKENS', 'f_LLM_MAX_OUTPUT_TOKENS'),
    numField('LLM_TEMPERATURE_CLASSIFY', 'f_LLM_TEMPERATURE_CLASSIFY', 'i_TEMPERATURE_CLASSIFY'),
    numField('LLM_TEMPERATURE_RESPOND', 'f_LLM_TEMPERATURE_RESPOND', 'i_TEMPERATURE_RESPOND'),
    numField('LLM_TEMPERATURE_COMPLEX', 'f_LLM_TEMPERATURE_COMPLEX', 'i_TEMPERATURE_COMPLEX'),
    numField('LLM_REQUEST_TIMEOUT_MS', 'f_LLM_REQUEST_TIMEOUT_MS'),
  ])

  // 5. Circuit Breaker
  h += panel('llm_cb', [
    numField('LLM_CIRCUIT_BREAKER_FAILURES', 'f_LLM_CIRCUIT_BREAKER_FAILURES', 'i_LLM_CB_FAILURES'),
    numField('LLM_CIRCUIT_BREAKER_WINDOW_MS', 'f_LLM_CIRCUIT_BREAKER_WINDOW_MS', 'i_LLM_CB_WINDOW'),
    numField('LLM_CIRCUIT_BREAKER_COOLDOWN_MS', 'f_LLM_CIRCUIT_BREAKER_COOLDOWN_MS', 'i_LLM_CB_COOLDOWN'),
  ])

  // 6. Pipeline
  h += panel('pipeline', [
    numField('PIPELINE_MAX_TOOL_CALLS_PER_TURN', 'f_PIPELINE_MAX_TOOL_CALLS_PER_TURN', 'i_PIPELINE_TOOLS'),
    numField('PIPELINE_MAX_CONVERSATION_TURNS', 'f_PIPELINE_MAX_CONVERSATION_TURNS', 'i_PIPELINE_TURNS'),
    numField('PIPELINE_SESSION_TTL_MS', 'f_PIPELINE_SESSION_TTL_MS', 'i_PIPELINE_TTL'),
  ])

  // 7. Follow-up (only show params if enabled)
  const followupEnabled = currentValues['FOLLOWUP_ENABLED'] === 'true'
  const followupFields = [boolField('FOLLOWUP_ENABLED', 'f_FOLLOWUP_ENABLED')]
  if (followupEnabled) {
    followupFields.push(
      numField('FOLLOWUP_DELAY_MINUTES', 'f_FOLLOWUP_DELAY_MINUTES', 'i_FOLLOWUP_DELAY'),
      numField('FOLLOWUP_MAX_ATTEMPTS', 'f_FOLLOWUP_MAX_ATTEMPTS', 'i_FOLLOWUP_MAX'),
      numField('FOLLOWUP_COLD_AFTER_ATTEMPTS', 'f_FOLLOWUP_COLD_AFTER_ATTEMPTS', 'i_FOLLOWUP_COLD'),
    )
  }
  h += panel('followup', followupFields)

  // 8. Dynamic module panels from registry
  h += renderModulePanels()

  // 9. Google (coming soon)
  h += panelSoon('google')

  // 10. Email (coming soon)
  h += panelSoon('email')

  // 11. DB (collapsed)
  h += panelCollapsed('db', [
    textField('DB_HOST'), textField('DB_PORT'), textField('DB_NAME'),
    textField('DB_USER'), secretField('DB_PASSWORD', null, null),
  ])

  // 12. Redis (collapsed)
  h += panelCollapsed('redis', [
    textField('REDIS_HOST'), textField('REDIS_PORT'), secretField('REDIS_PASSWORD', null, null),
  ])

  m.innerHTML = h
  renderWa()
}

// ═══════════════════════════════════════════
// Panel builders
// ═══════════════════════════════════════════
function panel(secKey, fieldsHtml) {
  return `<div class="panel"><div class="panel-header" onclick="togglePanel(this)">
    <span class="panel-title">${t('sec_'+secKey)}</span>
    <span class="panel-chevron">&#9660;</span>
  </div><div class="panel-body"><div class="panel-info">${t('sec_'+secKey+'_info')}</div>${fieldsHtml.join('')}</div></div>`
}
function panelRaw(secKey, innerHtml) {
  return `<div class="panel"><div class="panel-header" onclick="togglePanel(this)">
    <span class="panel-title">${t('sec_'+secKey)}</span>
    <span class="panel-chevron">&#9660;</span>
  </div><div class="panel-body"><div class="panel-info">${t('sec_'+secKey+'_info')}</div>${innerHtml}</div></div>`
}
function panelSoon(secKey) {
  return `<div class="panel collapsed"><div class="panel-header" onclick="togglePanel(this)">
    <span class="panel-title">${t('sec_'+secKey)} <span class="panel-badge badge-soon">Proximamente</span></span>
    <span class="panel-chevron">&#9660;</span>
  </div><div class="panel-body"><div class="panel-info">${t('sec_'+secKey+'_info')}</div></div></div>`
}
function panelCollapsed(secKey, fieldsHtml) {
  return `<div class="panel collapsed"><div class="panel-header" onclick="togglePanel(this)">
    <span class="panel-title">${t('sec_'+secKey)}</span>
    <span class="panel-chevron">&#9660;</span>
  </div><div class="panel-body"><div class="panel-info">${t('sec_'+secKey+'_info')}</div>${fieldsHtml.join('')}</div></div>`
}

function togglePanel(header) { header.closest('.panel').classList.toggle('collapsed') }

// ═══════════════════════════════════════════
// Field builders
// ═══════════════════════════════════════════
function textField(key, labelKey, infoKey) {
  const label = labelKey ? t(labelKey) : key
  const val = esc(currentValues[key] ?? '')
  const mod = currentValues[key] !== (originalValues[key] ?? '') ? ' modified' : ''
  let info = infoKey ? infoTooltip(key, infoKey) : ''
  return `<div class="field"><div class="field-left"><span class="field-label">${label}</span>${infoKey ? infoBtn(key) : ''}</div>
    <input type="text" data-key="${key}" value="${val}" oninput="onChange(this)" class="${mod}"></div>${info}`
}
function secretField(key, labelKey, infoKey) {
  const label = labelKey ? t(labelKey) : key
  const val = esc(currentValues[key] ?? '')
  const mod = currentValues[key] !== (originalValues[key] ?? '') ? ' modified' : ''
  let info = infoKey ? infoTooltip(key, infoKey) : ''
  return `<div class="field"><div class="field-left"><span class="field-label">${label}</span>${infoKey ? infoBtn(key) : ''}</div>
    <input type="password" data-key="${key}" value="${val}" oninput="onChange(this)" class="${mod}"></div>${info}`
}
function numField(key, labelKey, infoKey) {
  const label = labelKey ? t(labelKey) : key
  const val = esc(currentValues[key] ?? '')
  const mod = currentValues[key] !== (originalValues[key] ?? '') ? ' modified' : ''
  let info = infoKey ? infoTooltip(key, infoKey) : ''
  return `<div class="field"><div class="field-left"><span class="field-label">${label}</span>${infoKey ? infoBtn(key) : ''}</div>
    <input type="text" data-key="${key}" value="${val}" oninput="onChange(this)" class="${mod}"></div>${info}`
}
function boolField(key, labelKey) {
  const label = labelKey ? t(labelKey) : key
  const val = (currentValues[key] ?? 'false') === 'true'
  return `<div class="toggle-field">
    <span class="field-label">${label}</span>
    <label class="toggle"><input type="checkbox" data-key="${key}" ${val?'checked':''} onchange="onToggle(this)"><span class="toggle-slider"></span></label>
  </div>`
}

const MODEL_NAMES = {
  'claude-haiku-4-5-20251001': 'Haiku 4.5',
  'claude-sonnet-4-5-20250929': 'Sonnet 4.5',
  'claude-sonnet-4-6': 'Sonnet 4.6',
  'claude-opus-4-5-20251101': 'Opus 4.5',
  'claude-opus-4-6': 'Opus 4.6',
  'claude-sonnet-4-20250514': 'Sonnet 4',
  'claude-opus-4-20250514': 'Opus 4',
  'claude-opus-4-1-20250805': 'Opus 4.1',
  'gemini-2.5-flash': 'Flash 2.5',
  'gemini-2.5-pro': 'Pro 2.5',
  'gemini-2.0-flash': 'Flash 2.0',
  'gemini-1.5-pro': 'Pro 1.5',
  'gemini-1.5-flash': 'Flash 1.5',
}
function modelLabel(id) { return MODEL_NAMES[id] || id }

function modelDropdown(prefix, labelKey, infoKey) {
  const providerKey = prefix + '_PROVIDER'
  const modelKey = prefix + '_MODEL'
  const curProvider = currentValues[providerKey] ?? 'anthropic'
  const curModel = currentValues[modelKey] ?? ''
  const label = t(labelKey)
  const providers = ['anthropic', 'google']
  const models = allModels[curProvider === 'google' ? 'gemini' : curProvider] || []

  let providerOpts = providers.map(p => `<option value="${p}" ${p===curProvider?'selected':''}>${p}</option>`).join('')
  let modelOpts = models.map(m => `<option value="${m}" ${m===curModel?'selected':''}>${modelLabel(m)}</option>`).join('')
  // Add current model if not in list
  if (curModel && !models.includes(curModel)) {
    modelOpts = `<option value="${curModel}" selected>${modelLabel(curModel)}</option>` + modelOpts
  }

  return `<div class="field">
    <div class="field-left"><span class="field-label">${label}</span>${infoKey ? infoBtn(prefix) : ''}</div>
    <div class="model-row">
      <select data-key="${providerKey}" onchange="onProviderChange('${prefix}', this)">${providerOpts}</select>
      <select data-key="${modelKey}" onchange="onChange(this)">${modelOpts}</select>
    </div>
  </div>${infoKey ? infoTooltip(prefix, infoKey) : ''}`
}

function infoBtn(id) {
  return ` <button class="info-btn" onclick="event.stopPropagation();toggleInfo('info-${id}')">i</button>`
}
function infoTooltip(id, key) {
  return `<div class="info-tooltip" id="info-${id}">${t(key)}</div>`
}
function toggleInfo(id) {
  const el = document.getElementById(id)
  if (el) el.classList.toggle('visible')
}

function onProviderChange(prefix, el) {
  currentValues[prefix + '_PROVIDER'] = el.value
  // Re-render to update model list
  render()
  updateSaveBtn()
}

// ═══════════════════════════════════════════
// WhatsApp render
// ═══════════════════════════════════════════
function renderWa() {
  const inner = document.getElementById('wa-inner')
  if (!inner) return
  const s = waState
  const showQr = s.status === 'qr_ready' && s.qrDataUrl
  const moduleEnabled = s.moduleEnabled !== false
  const canConnect = moduleEnabled && (s.status === 'disconnected' || s.status === 'not_initialized')
  const canDisconnect = s.status === 'connected' || s.status === 'qr_ready' || s.status === 'connecting'

  const waPhone = currentValues['WHATSAPP_PHONE_NUMBER'] ?? ''
  const twilioPhone = currentValues['TWILIO_PHONE_NUMBER'] ?? ''

  inner.innerHTML = `
    <div class="wa-status-row">
      <span class="wa-badge ${s.status}"><span class="wa-dot"></span>${t('waStatus')[s.status] || s.status}</span>
      ${s.lastDisconnectReason ? `<span class="wa-reason">${t('reason')}: ${s.lastDisconnectReason}</span>` : ''}
    </div>
    <div class="wa-actions">
      <button class="wa-btn wa-btn-connect" onclick="waConnect()" ${canConnect?'':'disabled'} ${!moduleEnabled?'title="'+t('waModuleDisabled')+'"':''}>${t('connectBtn')}</button>
      <button class="wa-btn wa-btn-disconnect" onclick="waDisconnect()" ${canDisconnect?'':'disabled'}>${t('disconnectBtn')}</button>
    </div>
    <div class="wa-qr-box ${showQr?'':'wa-qr-hidden'}">
      ${showQr ? `<img src="${s.qrDataUrl}" alt="QR" />` : ''}
      <div class="wa-qr-label">${t('scanLabel')}</div>
    </div>
    <div class="wa-phones">
      <div><label>${t('f_WHATSAPP_PHONE')}</label>
        <input type="text" value="${esc(waPhone)}" oninput="onPhoneChange('WHATSAPP_PHONE_NUMBER',this)" class="${waPhone!==(originalValues['WHATSAPP_PHONE_NUMBER']??'')?'modified':''}"></div>
      <div><label>${t('f_TWILIO_PHONE')}</label>
        <input type="text" value="${esc(twilioPhone)}" oninput="onPhoneChange('TWILIO_PHONE_NUMBER',this)" class="${twilioPhone!==(originalValues['TWILIO_PHONE_NUMBER']??'')?'modified':''}"></div>
    </div>`
}

// ═══════════════════════════════════════════
// Handlers
// ═══════════════════════════════════════════
function onChange(el) {
  currentValues[el.dataset.key] = el.value
  el.classList.toggle('modified', el.value !== (originalValues[el.dataset.key] ?? ''))
  updateSaveBtn()
}
function onToggle(el) {
  currentValues[el.dataset.key] = el.checked ? 'true' : 'false'
  updateSaveBtn()
}
function onPhoneChange(key, el) {
  currentValues[key] = el.value
  el.classList.toggle('modified', el.value !== (originalValues[key] ?? ''))
  updateSaveBtn()
}
let _pendingApply = false
function updateSaveBtn() {
  const has = Object.keys(currentValues).some(k => currentValues[k] !== (originalValues[k] ?? ''))
  document.getElementById('btn-save').disabled = !has
  document.getElementById('btn-apply').disabled = !_pendingApply
}
function resetChanges() {
  currentValues = { ...originalValues }
  render(); updateSaveBtn()
  setStatus(t('discarded'), '')
}
async function saveChanges() {
  const changes = {}
  for (const [k,v] of Object.entries(currentValues)) {
    if (v !== (originalValues[k] ?? '')) changes[k] = v
  }
  if (!Object.keys(changes).length) return
  try {
    setStatus(t('saving'), '')
    const res = await fetch('/oficina/api/oficina/config', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(changes) })
    const data = await res.json()
    if (data.ok) {
      originalValues = { ...currentValues }; _pendingApply = true; render(); updateSaveBtn()
      setStatus(t('saved'), 'saved'); showToast(t('configSaved'), 'success')
    } else { setStatus(t('errorSave'), 'error') }
  } catch { setStatus(t('errorConnect'), 'error') }
}

async function applyChanges() {
  if (!confirm(t('applyConfirm'))) return
  try {
    const res = await fetch('/oficina/api/oficina/apply', { method: 'POST' })
    const data = await res.json()
    if (data.ok) {
      _pendingApply = false; updateSaveBtn()
      showToast(t('applySuccess'), 'success')
    } else { showToast(t('applyError'), 'error') }
  } catch { showToast(t('applyError'), 'error') }
}

async function resetDb() {
  if (!confirm(t('resetDbConfirm'))) return
  try {
    const res = await fetch('/oficina/api/oficina/reset-db', { method: 'POST' })
    const data = await res.json()
    if (data.ok) {
      showToast(t('resetDbSuccess'), 'success')
    } else { showToast(t('resetDbError'), 'error') }
  } catch { showToast(t('resetDbError'), 'error') }
}

async function triggerScan() {
  showToast(t('scanScanning'), 'success')
  try {
    const res = await fetch('/oficina/api/model-scanner/scan', { method: 'POST' })
    const data = await res.json()
    if (data.ok) {
      if (data.errors && data.errors.length > 0) {
        showToast(data.errors.map(e => e.provider + ': ' + e.message).join('\n'), 'error')
      } else {
        showToast(t('scanSuccess'), 'success')
      }
      // Refresh models and scan data
      const modelsRes = await fetch('/oficina/api/model-scanner/models')
      const modelsData = await modelsRes.json()
      allModels = modelsData.models || { anthropic: [], gemini: [] }
      lastScan = modelsData.scan || null
      // Show replacements if any
      if (data.replacements && data.replacements.length > 0) {
        const repDiv = document.getElementById('scan-replacements')
        if (repDiv) {
          repDiv.innerHTML = data.replacements.map(r =>
            `<div style="font-size:13px;color:var(--warning);padding:6px 10px;background:rgba(255,149,0,0.08);border-radius:6px;margin-bottom:4px">
              ${r.configKey}: <s>${r.oldModel}</s> ${t('scanReplaced')} <b>${r.newModel}</b>
            </div>`
          ).join('')
        }
      }
      render()
    } else { showToast(t('scanError'), 'error') }
  } catch { showToast(t('scanError'), 'error') }
}

// ═══════════════════════════════════════════
// Dynamic module panels
// ═══════════════════════════════════════════
function renderModulePanels() {
  let h = `<div class="panel"><div class="panel-header" onclick="togglePanel(this)">
    <span class="panel-title">${t('sec_modules')}</span>
    <span class="panel-chevron">&#9660;</span>
  </div><div class="panel-body"><div class="panel-info">${t('sec_modules_info')}</div>`

  // Filter: skip oficina itself (it's the panel we're in)
  const displayModules = moduleStates.filter(m => m.name !== 'oficina')

  for (const mod of displayModules) {
    const title = mod.oficina?.title ? (mod.oficina.title[lang] || mod.oficina.title.es || mod.name) : mod.name
    const info = mod.oficina?.info ? (mod.oficina.info[lang] || mod.oficina.info.es || '') : ''
    const isActive = mod.active
    const canToggle = mod.removable !== false

    h += `<div style="border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow-sm)">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg-primary)">
        <div>
          <span style="font-size:15px;font-weight:600;color:var(--text-primary)">${esc(title)}</span>
          <span class="panel-badge ${isActive ? 'badge-active' : 'badge-soon'}" style="margin-left:8px">${isActive ? t('activated') : t('deactivated')}</span>
          <span style="font-size:11px;color:var(--text-tertiary);margin-left:8px">${mod.type}</span>
        </div>
        ${canToggle ? `<label class="toggle"><input type="checkbox" ${isActive ? 'checked' : ''} onchange="toggleModule('${esc(mod.name)}', this.checked)"><span class="toggle-slider"></span></label>` : ''}
      </div>`

    // Only show config fields if module is active and has oficina fields
    if (isActive && mod.oficina?.fields && mod.oficina.fields.length > 0) {
      h += `<div style="padding:8px 16px 14px;border-top:1px solid var(--border-light);background:var(--bg-secondary)">`
      if (info) h += `<div class="panel-info">${esc(info)}</div>`
      for (const field of mod.oficina.fields) {
        const label = field.label ? (field.label[lang] || field.label.es || field.key) : field.key
        if (field.type === 'secret') {
          h += secretField(field.key, null, null).replace('class="field-label">' + field.key, 'class="field-label">' + esc(label))
        } else if (field.type === 'boolean') {
          h += boolField(field.key, null).replace('class="field-label">' + field.key, 'class="field-label">' + esc(label))
        } else if (field.type === 'number') {
          h += numField(field.key, null, null).replace('class="field-label">' + field.key, 'class="field-label">' + esc(label))
        } else if (field.type === 'select' && field.options) {
          h += selectField(field.key, label, field.options)
        } else {
          h += textField(field.key, null, null).replace('class="field-label">' + field.key, 'class="field-label">' + esc(label))
        }
      }
      h += `</div>`
    }

    h += `</div>`
  }

  h += `</div></div>`
  return h
}

function selectField(key, label, options) {
  const val = currentValues[key] ?? ''
  const mod = currentValues[key] !== (originalValues[key] ?? '') ? ' modified' : ''
  const opts = options.map(o => `<option value="${esc(o.value)}" ${o.value === val ? 'selected' : ''}>${esc(o.label?.[lang] || o.label?.es || o.value)}</option>`).join('')
  return `<div class="field"><div class="field-left"><span class="field-label">${esc(label)}</span></div>
    <select data-key="${key}" onchange="onChange(this)" class="${mod}">${opts}</select></div>`
}

async function toggleModule(name, active) {
  const endpoint = active ? '/oficina/api/oficina/activate' : '/oficina/api/oficina/deactivate'
  try {
    const res = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) })
    const data = await res.json()
    if (data.ok) {
      showToast(`${name} ${active ? t('activated') : t('deactivated')}`, 'success')
      await refreshModuleStates()
      render()
    } else {
      showToast(data.error || t('moduleToggleError'), 'error')
    }
  } catch {
    showToast(t('moduleToggleError'), 'error')
  }
}

async function refreshModuleStates() {
  try {
    const res = await fetch('/oficina/api/oficina/modules')
    const data = await res.json()
    moduleStates = data.modules || []
  } catch { /* ignore */ }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;') }
function setStatus(text, cls) { const el=document.getElementById('status'); el.textContent=text; el.className='status-text '+(cls||'') }
function showToast(msg, type) {
  const old=document.querySelector('.toast'); if(old) old.remove()
  const t=document.createElement('div'); t.className='toast '+type; t.textContent=msg
  document.body.appendChild(t); setTimeout(()=>t.remove(), 3500)
}

init()
</script>
