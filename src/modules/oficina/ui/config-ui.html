<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luna — Oficina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/oficina/static/styles/base.css">
  <link rel="stylesheet" href="/oficina/static/styles/layout.css">
  <link rel="stylesheet" href="/oficina/static/styles/components.css">
  <link rel="stylesheet" href="/oficina/static/styles/whatsapp.css">
  <link rel="stylesheet" href="/oficina/static/styles/sidebar.css">
</head>
<body>
  <header>
    <h1>Oficina <span>| LUNA</span></h1>
    <div class="header-right">
      <span class="build-ver" id="build-ver"></span>
      <button class="lang-toggle" id="lang-btn" onclick="toggleLang()">EN</button>
      <span class="status-text" id="status">...</span>
    </div>
  </header>
  <main id="main">
    <div class="app-layout">
      <nav class="sidebar" id="sidebar"></nav>
      <div class="content-area" id="content"><div class="loading">...</div></div>
    </div>
  </main>
  <div class="save-bar">
    <button class="btn-reset" onclick="resetDb()" id="btn-resetdb" style="background:var(--error);color:#ffffff;margin-right:auto">Reset DB</button>
    <button class="btn-reset" onclick="resetChanges()" id="btn-reset">Descartar</button>
    <button class="btn-save" id="btn-save" onclick="saveChanges()" disabled>Guardar</button>
    <button class="btn-save" id="btn-apply" onclick="applyChanges()" style="background:var(--success)" disabled>Aplicar</button>
  </div>

<!-- JS modules (order matters: dependencies first) -->
<script src="/oficina/static/js/i18n.js"></script>
<script src="/oficina/static/js/state.js"></script>
<script src="/oficina/static/js/utils.js"></script>
<script src="/oficina/static/js/fields.js"></script>
<script src="/oficina/static/js/panels.js"></script>
<script src="/oficina/static/js/navigation.js"></script>
<script src="/oficina/static/js/whatsapp.js"></script>
<script src="/oficina/static/js/modules.js"></script>
<script src="/oficina/static/js/render.js"></script>
<script src="/oficina/static/js/handlers.js"></script>
<script src="/oficina/static/js/app.js"></script>
</body>
</html>
